name: ECOS Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'ecos_backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'ecos_backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sys_man
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: ecos_backend
        run: mvn clean install -DskipTests -Dmaven.test.skip=true -B

      - name: Run unit tests
        working-directory: ecos_backend
        run: mvn test -pl common/common-api -B
        continue-on-error: true

      - name: Archive gateway JAR
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: ecos_backend/gateway/target/gateway-*.jar
          retention-days: 5

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ecos_frontend/package-lock.json

      - name: Install dependencies
        working-directory: ecos_frontend
        run: npm ci

      - name: Type check
        working-directory: ecos_frontend
        run: npm run lint

      - name: Run tests
        working-directory: ecos_frontend
        run: npm test

  docker-compose-smoke:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure
        working-directory: ecos-docker
        run: docker-compose up -d postgres kafka zookeeper neo4j minio
        continue-on-error: true

      - name: Wait for services
        run: sleep 30

      - name: Health check
        run: |
          curl -sf http://localhost:5432 || echo "PG not directly reachable (expected, use docker network)"
          docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Tear down
        working-directory: ecos-docker
        run: docker-compose down -v
        if: always()
