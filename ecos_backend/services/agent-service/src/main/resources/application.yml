server:
  port: 18086

spring:
  application:
    name: agent-service
  datasource:
    url: jdbc:postgresql://localhost:5432/sys_man?currentSchema=ecos_agent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: agent-service
      auto-offset-reset: earliest
  flyway:
    enabled: false

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

neo4j:
  uri: bolt://localhost:7687
  authentication:
    username: neo4j
    password: your_password
