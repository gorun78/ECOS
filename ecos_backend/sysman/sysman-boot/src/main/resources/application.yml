# Hermes Agent Engine Configuration
hermes:
  engine:
    running: false
    default-provider: openrouter
    default-model: deepseek/deepseek-chat
    max-concurrency: 5
    default-timeout: 600
  gateway:
    retry-max-attempts: 3
    request-timeout: 60s
  profile:
    cache-enabled: false
    cache-ttl-minutes: 30
