server:
  port: 8081
  servlet:
    context-path: /sys-man

spring:
  application:
    name: sys-man-service
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# ECOS 版本标识: standard / enterprise / ultimate
ecos:
  edition: ${ECOS_EDITION:all}

  datasource:
    url: jdbc:postgresql://localhost:5432/sys_man?currentSchema=public
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: SysManHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

# MyBatis Configuration
mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false

# Authentication Configuration
auth:
  enabled: true
  whitelist:
    paths:
      - "/api/health"
      - "/auth/**"
      - "/api/v1/auth/**"
      - "/error"
      - "/api/agent/**"
      - "/api/v1/ecos/**"
      - "/api/v1/gsxk/**"
      - "/api/audit-logs"

# LLM Configuration
llm:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    model: deepseek-chat

logging:
  level:
    root: INFO
    com.chinacreator.gzcm: DEBUG
    org.springframework: INFO

