# Sys-Man模块错误消息 - 中文
# 通用错误
error.1000=未知错误
error.1001=参数无效
error.1002=资源未找到
error.1003=操作失败

# 用户相关错误
error.2000=用户不存在
error.2001=用户已存在
error.2002=密码无效
error.2003=用户状态异常

# 角色相关错误
error.3000=角色不存在
error.3001=角色已存在
error.3002=角色正在使用中，无法删除

# 权限相关错误
error.4000=权限不存在
error.4001=权限不足
error.4002=权限验证失败

# 组织相关错误
error.5000=组织不存在
error.5001=组织已存在
error.5002=组织下有子组织，无法删除

# 配置相关错误
error.6000=配置不存在
error.6001=配置加载失败
error.6002=配置格式错误
error.6003=配置验证失败
