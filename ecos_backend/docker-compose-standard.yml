version: '3.8'
# ECOS 标准版 — PG Only, 单租户, <50GB
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sys_man
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sys_man"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ecos-gateway:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    environment:
      SPRING_PROFILES_ACTIVE: standard
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
